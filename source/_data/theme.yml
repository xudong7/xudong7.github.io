# hexo-theme-academia configuration
# 修改后需重启 hexo server

favicon: /img/favicon.png
avatar: /img/avatar.jpg
author: 'Dong Xu'
author_bio: 'Undergraduate Researcher, Sun Yat-sen University'

since: 2020

# Top Menu
# #title 为页内跳转(锚点)，适合单页模式
# 也可以配置为其他页面链接或外链
menu:
  Home: /
  Publications: /#Selected-Papers
  Research: /#Research-Interests
  Projects: /#Projects
  Education: /#Education

# fallback image when avatar fails to load
loading_bg:
  flink: /img/profile.png

# Social Links
# 图标使用 font-awesome 5 (fas/fab fa-xxx)
social:
  enable: true
social_links:
  fab fa-github: https://github.com/xudong7
  fas fa-envelope: mailto:xudong7@mail2.sysu.edu.cn
  fab fa-qq: mailto:516348828@qq.com
  fab fa-zhihu: https://www.zhihu.com/people/ssgang-ba-zi

# Additional social links
e_social:
  enable: true
e_social_links:
  Google Scholar: https://scholar.google.com/ || fas fa-graduation-cap
  ORCID: https://orcid.org/ || fab fa-orcid

# CV download
cv_dl:
  enable: false
  dir: /attaches/CV.pdf
  description: My Detail CV.

# Box-shadow on page
box_shadow:
  enable: false

# CDN resources
CDN_USE:
  css:
    - /css/index.css
    - https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.13.0/css/all.min.css
  js:
    - https://cdn.jsdelivr.net/npm/jquery@latest/dist/jquery.min.js
    - https://cdn.jsdelivr.net/npm/jquery-pjax@latest/jquery.pjax.min.js
    - /js/main.js
